[www]
; Run workers as www-data (container runs as www-data, no privilege escalation)
user = www-data
group = www-data

; Preserve Docker environment variables (APP_ENV, APP_SECRET, etc.)
clear_env = no

; Listen on TCP port (for nginx FastCGI)
listen = 127.0.0.1:9000

; Process management
pm = dynamic

; SSE sizing: each SSE client holds 1 worker for 30s (event loop duration).
; With max_children=10: up to 10 concurrent SSE connections, minus workers
; needed for regular API requests (~2-3 during active sessions).
; For production with >5 concurrent voters, increase to 20-30.
; Formula: max_children >= (expected SSE clients) + (peak API concurrency)
;
; Current conservative setting (10) supports:
;   - 1 operator + 1 projection + 5 voters + 3 API slots = 10
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests = 500

; Timeouts
request_terminate_timeout = 60s

; Slow requests: log anything taking more than 5s (helps identify bottlenecks)
slowlog = /dev/stderr
request_slowlog_timeout = 5s

; Error logging
catch_workers_output = yes
decorate_workers_output = no
