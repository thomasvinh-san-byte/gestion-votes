; Production PHP settings for AG-VOTE

; Error handling
display_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Performance
opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 4000
; validate_timestamps set at runtime by entrypoint (OFF in prod, ON in dev)

; Limits
memory_limit = 256M
upload_max_filesize = 10M
post_max_size = 12M
max_execution_time = 60
max_input_time = 60

; Session
; Storage handler = Redis DB1 (isolated from app cache on DB0).
; The save_path here omits auth= because REDIS_PASSWORD is runtime-only;
; entrypoint.sh appends an authenticated save_path to /tmp/php-runtime/zz-runtime.ini
; which loads after this file (PHP_INI_SCAN_DIR last-wins).
session.save_handler = redis
session.save_path = "tcp://redis:6379?database=1&prefix=agvote-sess:"
session.cookie_httponly = 1
; cookie_secure forced ON by entrypoint for non-dev environments.
; Default OFF here so local Docker dev (plain HTTP) actually works.
session.cookie_secure = 0
session.cookie_samesite = Lax
session.use_strict_mode = 1

; Security
expose_php = Off
allow_url_include = Off

; Timezone
date.timezone = Europe/Paris
