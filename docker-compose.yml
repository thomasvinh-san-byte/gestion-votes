# =============================================================================
# AG-VOTE — Docker Compose
# =============================================================================
# Démarrage rapide :
#   cp .env.example .env          # adapter les valeurs (DB_PASS obligatoire)
#   docker compose up -d          # lancer tous les services
#   docker compose logs -f app    # suivre les logs
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Application : Nginx + PHP-FPM (supervisord)
  # ---------------------------------------------------------------------------
  app:
    build: .
    container_name: agvote-app
    restart: unless-stopped
    ports:
      - "0.0.0.0:${APP_PORT:-8080}:8080"     # HTTP
    env_file:
      - path: .env
        required: false
    environment:
      # --- Application ---
      APP_ENV: "${APP_ENV:-demo}"
      APP_DEBUG: "${APP_DEBUG:-1}"
      APP_SECRET: "${APP_SECRET:-dev-secret-do-not-use-in-production-change-me-now-please-64chr}"
      # --- Security (auth+CSRF on by default, even in demo) ---
      APP_AUTH_ENABLED: "${APP_AUTH_ENABLED:-1}"
      CSRF_ENABLED: "${CSRF_ENABLED:-1}"
      RATE_LIMIT_ENABLED: "${RATE_LIMIT_ENABLED:-1}"
      # --- Database ---
      DB_DSN: "pgsql:host=db;port=5432;dbname=${DB_DATABASE:-vote_app}"
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: "${DB_DATABASE:-vote_app}"
      DB_USER: "${DB_USER:-vote_app}"
      DB_PASS: "${DB_PASS:?DB_PASS requis — definir dans .env}"
      # --- Redis ---
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "${REDIS_PASSWORD:-agvote-redis-dev}"
      # --- CORS ---
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}"
      # --- Demo data ---
      LOAD_DEMO_DATA: "${LOAD_DEMO_DATA:-1}"
    volumes:
      - app-storage:/tmp/ag-vote    # logs, cache PDF, fonts
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/api/v1/health.php"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    read_only: true
    tmpfs:
      - /tmp:size=128M
      - /var/run:size=1M
      - /var/log/nginx:size=10M,uid=82,gid=82
      - /var/lib/nginx/tmp:size=64M,uid=82,gid=82
      - /var/lib/nginx/logs:size=1M,uid=82,gid=82
    security_opt:
      - no-new-privileges:true
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

  # ---------------------------------------------------------------------------
  # Base de données PostgreSQL
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16.8-alpine3.21
    container_name: agvote-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${DB_DATABASE:-vote_app}"
      POSTGRES_USER: "${DB_USER:-vote_app}"
      POSTGRES_PASSWORD: "${DB_PASS:?DB_PASS requis — definir dans .env}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${DB_EXTERNAL_PORT:-5433}:5432"   # localhost uniquement (pas exposé au réseau)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vote_app} -d ${DB_DATABASE:-vote_app}"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    security_opt:
      - no-new-privileges:true
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M

  # ---------------------------------------------------------------------------
  # Redis — Queue, rate limiter, cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine3.21
    container_name: agvote-redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru", "--save", "", "--requirepass", "${REDIS_PASSWORD:-agvote-redis-dev}"]
    ports:
      - "127.0.0.1:${REDIS_EXTERNAL_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:-agvote-redis-dev}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 32M

networks:
  backend:
    driver: bridge

volumes:
  pgdata:
    driver: local
  app-storage:
    driver: local
