# =============================================================================
# AG-VOTE — Validate, Build & Push Docker image to GitHub Container Registry
# =============================================================================
# Déclenché sur :
#   - push sur main (image :latest)
#   - création d'un tag v*.*.* (image :vX.Y.Z + :latest)
#   - pull request sur main (build sans push, pour validation)
# =============================================================================

name: Docker Build & Push

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Pre-flight: fast checks that catch errors before the slow Docker build
  # ---------------------------------------------------------------------------
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP (must match Dockerfile)
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: intl, mbstring, zip, gd, pdo_pgsql
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Verify composer.lock is in sync
        run: composer validate --no-check-publish --strict

      - name: Verify platform requirements
        run: composer check-platform-reqs --no-dev

      - name: Install dependencies (with dev for tests)
        run: composer install --optimize-autoloader --no-interaction --no-progress

      - name: Run PHPUnit tests
        run: vendor/bin/phpunit --no-coverage

      - name: Run PHPStan static analysis
        run: vendor/bin/phpstan analyse --no-progress

      - name: PHP syntax check on app/
        run: find app/ -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Verify Dockerfile PHP version matches composer.json
        run: |
          DOCKER_PHP=$(grep -oP 'FROM php:\K[0-9]+\.[0-9]+' Dockerfile)
          COMPOSER_PHP=$(php -r '$j=json_decode(file_get_contents("composer.json"),true); $p=$j["config"]["platform"]["php"] ?? ""; echo $p ? implode(".",array_slice(explode(".",$p),0,2)) : "unset";')
          echo "Dockerfile PHP: $DOCKER_PHP"
          echo "Composer platform PHP: $COMPOSER_PHP"
          if [ "$DOCKER_PHP" != "$COMPOSER_PHP" ]; then
            echo "::error::PHP version mismatch! Dockerfile=$DOCKER_PHP, composer.json platform=$COMPOSER_PHP"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # ESLint: lint frontend JavaScript
  # ---------------------------------------------------------------------------
  lint-js:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Run ESLint (errors fail, capped innerHTML warnings)
        run: npm run lint:ci

  # ---------------------------------------------------------------------------
  # Migration syntax check: grep for SQLite patterns (no PostgreSQL needed)
  # ---------------------------------------------------------------------------
  migrate-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate migration syntax (no SQLite patterns)
        run: bash scripts/validate-migrations.sh --syntax-only

  # ---------------------------------------------------------------------------
  # Coverage gate: PHPUnit Unit suite with pcov, enforces thresholds
  # ---------------------------------------------------------------------------
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP with pcov
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: intl, mbstring, zip, gd, pdo_pgsql, pcov
          coverage: pcov
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --optimize-autoloader --no-interaction --no-progress

      - name: Run coverage check (Services >= 90%, Controllers >= 60%)
        run: bash scripts/coverage-check.sh

  # ---------------------------------------------------------------------------
  # Docker build, smoke test, then push
  # ---------------------------------------------------------------------------
  # Two-step pattern: build+load for local smoke test, then push from cache.
  # This avoids the load+push conflict in Buildx < 0.13.0, and ensures we
  # never push a broken image to the registry.
  # ---------------------------------------------------------------------------
  build:
    needs: [validate, lint-js, migrate-check, coverage]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      # Step 1: Build and load locally for smoke test (never push)
      - name: Build image for testing
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: agvote:smoke-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 2: Verify the image actually works
      - name: Smoke test — PHP extensions and autoload
        run: |
          echo "Checking PHP extensions..."
          docker run --rm --entrypoint "" agvote:smoke-test php -r '
            $required = ["gd","intl","zip","pdo_pgsql","pgsql","mbstring","redis","Zend OPcache"];
            $missing = array_filter($required, fn($e) => !extension_loaded($e));
            if ($missing) { fwrite(STDERR, "Missing extensions: ".implode(", ", $missing)."\n"); exit(1); }
            echo "All extensions OK\n";
          '
          echo "Checking composer autoload..."
          docker run --rm --entrypoint "" agvote:smoke-test php -r 'require "/var/www/vendor/autoload.php"; echo "Autoload OK\n";'

      # Step 3: Push to registry (cache makes this near-instant, no rebuild)
      - name: Push to registry
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          load: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

  # ---------------------------------------------------------------------------
  # E2E tests: Playwright against the full Docker stack (post-build)
  # ---------------------------------------------------------------------------
  e2e:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image from GHA cache (load locally as agvote:ci)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: agvote:ci
          cache-from: type=gha

      - name: Tag image for docker compose (COMPOSE_PROJECT_NAME=agvote expects agvote-app)
        run: docker tag agvote:ci agvote-app

      - name: Start Docker stack (db + redis + app using pre-built image)
        run: |
          export DB_PASS=ci-test-password
          # Start db and redis first, wait for them to be healthy
          COMPOSE_PROJECT_NAME=agvote docker compose up -d db redis
          echo "Waiting for PostgreSQL..."
          for i in $(seq 1 30); do
            if COMPOSE_PROJECT_NAME=agvote docker compose exec -T db pg_isready -U vote_app 2>/dev/null; then
              echo "PostgreSQL ready after ${i}s"
              break
            fi
            sleep 1
          done
          echo "Waiting for Redis..."
          for i in $(seq 1 30); do
            if COMPOSE_PROJECT_NAME=agvote docker compose exec -T redis redis-cli -a "agvote-redis-dev" ping 2>/dev/null | grep -q PONG; then
              echo "Redis ready after ${i}s"
              break
            fi
            sleep 1
          done
          # Start app using pre-built image (no-build avoids rebuilding from Dockerfile)
          COMPOSE_PROJECT_NAME=agvote docker compose up -d --no-build app
          echo "Waiting for app to be healthy..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/api/v1/health.php > /dev/null 2>&1; then
              echo "App healthy after ${i}s"
              break
            fi
            sleep 1
          done
        env:
          DB_PASS: ci-test-password

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Playwright E2E tests (chromium only)
        run: npx playwright test --project=chromium
        working-directory: tests/e2e
        env:
          CI: "true"
          BASE_URL: http://localhost:8080

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

      - name: Cleanup Docker stack
        if: always()
        run: COMPOSE_PROJECT_NAME=agvote docker compose down -v 2>/dev/null || true
        env:
          DB_PASS: ci-test-password

  # ---------------------------------------------------------------------------
  # Integration tests: PHPUnit Integration suite against real Postgres + Redis
  # ---------------------------------------------------------------------------
  integration:
    needs: [build]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.8-alpine3.21
        env:
          POSTGRES_DB: agvote_test
          POSTGRES_USER: agvote
          POSTGRES_PASSWORD: agvote
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agvote -d agvote_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.4-alpine3.21
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: intl, mbstring, zip, gd, pdo_pgsql, redis
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --optimize-autoloader --no-interaction --no-progress

      - name: Load base schema
        run: PGPASSWORD=agvote psql -h localhost -U agvote -d agvote_test -f database/schema-master.sql

      - name: Apply migrations
        run: |
          for f in database/migrations/*.sql; do
            echo "Applying: $(basename $f)"
            PGPASSWORD=agvote psql -h localhost -U agvote -d agvote_test -f "$f"
          done

      - name: Run Integration tests
        run: vendor/bin/phpunit --testsuite Integration --no-coverage
        env:
          DATABASE_URL: "pgsql:host=localhost;dbname=agvote_test;user=agvote;password=agvote"
          REDIS_HOST: localhost
          REDIS_PORT: 6379
