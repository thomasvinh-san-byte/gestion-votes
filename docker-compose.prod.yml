# =============================================================================
# AG-VOTE — Docker Compose PRODUCTION
# =============================================================================
# Usage :
#   cp .env.production .env
#   # Remplir toutes les valeurs <…> dans .env
#   docker compose -f docker-compose.prod.yml up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Application : Nginx + PHP-FPM (supervisord)
  # ---------------------------------------------------------------------------
  app:
    build: .
    container_name: agvote-app
    restart: always
    ports:
      - "${APP_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "0"
      APP_AUTH_ENABLED: "1"
      CSRF_ENABLED: "1"
      RATE_LIMIT_ENABLED: "1"
      LOAD_DEMO_DATA: "0"
      DB_DSN: "pgsql:host=db;port=5432;dbname=${DB_DATABASE:-vote_app};sslmode=prefer"
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: "${DB_DATABASE:-vote_app}"
      DB_USERNAME: "${DB_USER:-vote_app}"
      DB_PASSWORD: "${DB_PASS:?DB_PASS requis}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "${REDIS_PASSWORD:?REDIS_PASSWORD requis}"
    volumes:
      - app-storage:/tmp/ag-vote
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/api/v1/health.php"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    read_only: true
    tmpfs:
      - /tmp:size=128M
      - /var/run:size=1M
      - /var/log/nginx:size=10M,uid=82,gid=82
      - /var/lib/nginx/tmp:size=64M,uid=82,gid=82
      - /var/lib/nginx/logs:size=1M,uid=82,gid=82
    security_opt:
      - no-new-privileges:true
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2.0"
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # PostgreSQL avec backups automatiques
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16.8-alpine3.21
    container_name: agvote-db
    restart: always
    environment:
      POSTGRES_DB: "${DB_DATABASE:-vote_app}"
      POSTGRES_USER: "${DB_USER:-vote_app}"
      POSTGRES_PASSWORD: "${DB_PASS:?DB_PASS requis}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Pas de port exposé en prod — uniquement accessible via le réseau interne
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vote_app} -d ${DB_DATABASE:-vote_app}"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    security_opt:
      - no-new-privileges:true
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine3.21
    container_name: agvote-redis
    restart: always
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
      --requirepass "${REDIS_PASSWORD:?REDIS_PASSWORD requis}"
    volumes:
      - redisdata:/data
    # Pas de port exposé en prod
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M

  # ---------------------------------------------------------------------------
  # Backup automatique PostgreSQL (quotidien, rétention 7 jours)
  # ---------------------------------------------------------------------------
  db-backup:
    image: postgres:16.8-alpine3.21
    container_name: agvote-db-backup
    restart: always
    entrypoint: /bin/sh
    command: >
      -c 'while true; do
        PGPASSWORD="$$DB_PASS" pg_dump -h db -U "$$DB_USER" "$$DB_DATABASE"
          | gzip > "/backups/$$(date +%Y%m%d_%H%M%S).sql.gz";
        find /backups -name "*.sql.gz" -mtime +7 -delete;
        echo "[backup] $$(date) — done";
        sleep 86400;
      done'
    environment:
      DB_USER: "${DB_USER:-vote_app}"
      DB_PASS: "${DB_PASS:?DB_PASS requis}"
      DB_DATABASE: "${DB_DATABASE:-vote_app}"
    volumes:
      - db-backups:/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

networks:
  backend:
    driver: bridge

volumes:
  pgdata:
    driver: local
  app-storage:
    driver: local
  redisdata:
    driver: local
  db-backups:
    driver: local
