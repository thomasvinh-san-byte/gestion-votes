<!doctype html>
<!-- GO-LIVE-STATUS: ready — Administration utilisateurs (rebuild v4.3). KPI row + user management table. -->
<html lang="fr" data-page-role="admin">
<head>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta charset="utf-8">
  <style id="critical-tokens">
    :root { --color-bg: oklch(0.922 0.013 95); --color-surface: oklch(0.969 0.006 95); --color-text: oklch(0.180 0.012 75); }
    [data-theme="dark"] { --color-bg: oklch(0.090 0.008 78); --color-surface: oklch(0.115 0.009 78); --color-text: oklch(0.908 0.015 265); }
    html, body { background: var(--color-bg); }
  </style>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1650E0" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0B0F1A" media="(prefers-color-scheme: dark)">
  <meta name="description" content="Administration &mdash; AG-VOTE">
  <title>Administration &mdash; AG-VOTE</title>
  <script src="/assets/js/theme-init.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/assets/css/app.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body>
  <!-- Skip links -->
  <a href="#main-content" class="skip-link">Aller au contenu principal</a>
  <a href="#main-nav" class="skip-link">Aller &agrave; la navigation</a>

  <div class="app-shell">
    <aside class="app-sidebar" data-include-sidebar data-page="admin"></aside>

    <!-- Header -->
    <header class="app-header" role="banner">
      <div class="flex items-center gap-4">
        <div>
          <nav class="breadcrumb" aria-label="Fil d'Ariane">
            <span class="bc-item bc-current" aria-current="page">Administration</span>
          </nav>
          <h1 class="page-title">
            <span class="bar"></span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            Administration
          </h1>
          <p class="page-sub">Utilisateurs et param&egrave;tres syst&egrave;me</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button id="btnRefresh" class="btn btn-secondary btn-sm" type="button">Actualiser</button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="app-main" id="main-content" role="main">

      <div class="admin-content">

        <!-- ════════════════════════════════════════════
             KPI ROW — 4 cards
             ════════════════════════════════════════════ -->
        <div class="admin-kpis">

          <div class="kpi-card kpi-card--1">
            <div class="kpi-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </div>
            <div class="kpi-value" id="adminKpiMembers">-</div>
            <div class="kpi-label">Membres</div>
          </div>

          <div class="kpi-card kpi-card--2">
            <div class="kpi-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
            </div>
            <div class="kpi-value" id="adminKpiSessions">-</div>
            <div class="kpi-label">S&eacute;ances</div>
          </div>

          <div class="kpi-card kpi-card--3">
            <div class="kpi-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            </div>
            <div class="kpi-value" id="adminKpiVotes">-</div>
            <div class="kpi-label">Votes</div>
          </div>

          <div class="kpi-card kpi-card--4">
            <div class="kpi-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            </div>
            <div class="kpi-value" id="adminKpiActive">-</div>
            <div class="kpi-label">Actifs (7j)</div>
          </div>

        </div>

        <!-- ════════════════════════════════════════════
             USER MANAGEMENT SECTION
             ════════════════════════════════════════════ -->
        <div class="admin-users-section">

          <!-- Section Header: title + search/filter/create -->
          <div class="section-header">
            <div class="section-header__left">
              <h2>Utilisateurs</h2>
              <span id="usersCount" class="section-count">- utilisateurs</span>
            </div>
            <div class="section-actions">
              <input id="searchUser" type="search" class="form-input form-input-sm"
                placeholder="Rechercher..." autocomplete="off" aria-label="Rechercher un utilisateur">
              <select id="filterRole" class="form-input form-input-sm" aria-label="Filtrer par r&ocirc;le">
                <option value="">Tous les r&ocirc;les</option>
                <option value="admin">Admin</option>
                <option value="operator">Op&eacute;rateur</option>
                <option value="auditor">Auditeur</option>
                <option value="viewer">Observateur</option>
              </select>
              <button id="btnCreateUser" class="btn btn-primary btn-sm" type="button">Ajouter un utilisateur</button>
            </div>
          </div>

          <!-- Create User Form -->
          <div class="admin-create-form">
            <input id="newName" type="text" class="form-input" placeholder="Nom" autocomplete="name">
            <input id="newEmail" type="email" class="form-input" placeholder="Email" autocomplete="email">
            <div class="admin-password-wrap">
              <input id="newPassword" type="password" class="form-input" placeholder="Mot de passe" autocomplete="new-password">
              <div id="passwordStrength" class="password-strength" hidden>
                <div id="passwordStrengthFill" class="password-strength-fill"></div>
                <span id="passwordStrengthText" class="password-strength-text"></span>
              </div>
            </div>
            <select id="newRole" class="form-input">
              <option value="">R&ocirc;le</option>
              <option value="admin">Admin</option>
              <option value="operator">Op&eacute;rateur</option>
              <option value="auditor">Auditeur</option>
              <option value="viewer">Observateur</option>
            </select>
          </div>

          <!-- Users List Container — populated by admin.js renderUsersTable() -->
          <div id="usersListContainer" aria-live="polite"></div>

          <!-- Pagination Bar -->
          <div class="admin-pagination">
            <span id="usersPaginationInfo" class="pagination-info">- utilisateurs</span>
            <div class="pagination-controls">
              <button id="usersPrevPage" class="btn btn-ghost btn-sm" type="button">Pr&eacute;c&eacute;dent</button>
              <div id="usersPaginationPages" class="pagination-pages"></div>
              <button id="usersNextPage" class="btn btn-ghost btn-sm" type="button">Suivant</button>
            </div>
          </div>

        </div><!-- /.admin-users-section -->

      </div><!-- /.admin-content -->

    </main>

    <footer class="app-footer mobile-footer" role="contentinfo">
      <a href="/dashboard" class="logo" aria-label="AG-VOTE">
        <span class="logo-mark">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/></svg>
        </span>
        AG-VOTE
      </a>
      <span class="text-muted">v4.3</span>
      <span class="mobile-footer-spacer"></span>
      <a href="/help" class="text-muted mobile-footer-link">Aide</a>
      <a href="/settings#accessibilite" class="text-muted mobile-footer-link">Accessibilit&eacute;</a>
    </footer>
  </div>

  <!-- Drawer (shell.js) -->
  <div class="drawer-backdrop" data-drawer-close></div>
  <aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-label="Panneau lat&eacute;ral">
    <div class="drawer-header">
      <div id="drawerTitle" class="font-semibold">Menu</div>
      <button class="btn btn-ghost btn-icon btn-sm" type="button" data-drawer-close aria-label="Fermer le panneau">&times;</button>
    </div>
    <div id="drawerBody" class="drawer-body"></div>
  </aside>

  <!-- Scripts -->
  <script type="module" src="/assets/js/components/index.js"></script>
  <script src="/assets/js/core/utils.js"></script>
  <script src="/assets/js/core/shared.js"></script>
  <script src="/assets/js/core/shell.js"></script>
  <script src="/assets/js/pages/admin.js"></script>
</body>
</html>
