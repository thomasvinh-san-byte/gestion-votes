              <LI name="logIn" size={20} color="#fff"/>
            </div>
            <div><div style={{fontSize:17,fontWeight:800,color:"var(--text-dark)",
              fontFamily:"var(--font-display)"}}>Connexion</div>
            <div style={{fontSize:12,color:"var(--text-muted)"}}>Adresse .cci.re du campus</div></div>
          </div>
          <div className="field-group" style={{marginBottom:10}}><div className="field-label">Identifiant</div><input className="field-input" placeholder="prenom.nom@cci.re" value={user} onChange={e=>setUser(e.target.value)} maxLength={80} autoComplete="username" aria-label="Identifiant"/></div>
          <div className="field-group" style={{marginBottom:10}}><div className="field-label">Mot de passe</div><input className="field-input" type="password" placeholder="••••••••" value={pass} onChange={e=>setPass(e.target.value)} maxLength={128} autoComplete="current-password" aria-label="Mot de passe"/></div>
          <div className="field-group" style={{marginBottom:10}}><div className="field-label">Profil <span style={{fontSize:10,fontWeight:400,color:"var(--text-light)"}}>(démo)</span></div><select className="field-input" value={role} onChange={e=>setRole(e.target.value)} aria-label="Rôle utilisateur" style={{appearance:"auto"}}><option value="etudiant">Étudiant</option><option value="bde">BDE</option><option value="formateur">Formateur</option><option value="admin">Administrateur</option></select></div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <label style={{fontSize:11,color:"var(--text-muted)",display:"flex",alignItems:"center",gap:5,cursor:"pointer"}}><input type="checkbox" style={{accentColor:"var(--accent)"}}/> Se souvenir de moi</label>
            <a style={{fontSize:11,color:"var(--accent)",cursor:"pointer",fontWeight:600}}>Mot de passe oublié ?</a>
          </div>
          <button className="btn btn-p btn-block" onClick={go} disabled={loading} aria-busy={loading} style={{marginBottom:10,minHeight:40,fontSize:14}}>
            {loading
              ?<span style={{display:"flex",alignItems:"center",gap:8,justifyContent:"center"}}>
                <span style={{width:16,height:16,border:"2.5px solid rgba(255,255,255,.3)",
                  borderTop:"2.5px solid #fff",borderRadius:"50%",display:"inline-block",
                  animation:"spin 0.7s linear infinite"}}/>Connexion…</span>
              :<>{ico("logIn",16)} Se connecter</>}
          </button>
          <div style={{padding:"6px 10px",background:"var(--surface-alt)",
            borderRadius:"var(--radius-sm)",fontSize:11,color:"var(--text-muted)",textAlign:"center",lineHeight:1.5}}>
            {ico("info",12)} Connectez-vous avec votre adresse .cci.re. Mot de passe oublié ? Contactez le service informatique.
          </div>
          <div style={{padding:"4px 10px",fontSize:10,color:"var(--text-light)",textAlign:"center",lineHeight:1.5}}>
            {ico("shield",10)} Traitement art. 6.1.e RGPD · <a style={{color:"var(--accent)",cursor:"pointer"}}>Confidentialité</a>
          </div>
        </div>
      </div>
    </div>
    <div className="landing-footer">© GeniusLab — Établissement · <a style={{cursor:"pointer",color:"var(--accent)"}}>Mentions légales</a> · <a style={{cursor:"pointer",color:"var(--accent)"}}>Confidentialité</a> · <a style={{cursor:"pointer",color:"var(--accent)"}}>Accessibilité</a></div>
  </div>
)};

/* ═══════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════ */
function App(){
  const[logged,setLogged]=useState(false);
  const[userRole,setUserRole]=useState("etudiant");
  const[demandes,setDemandes]=useState(INIT_DEMANDES);
  const[heroMode,setHeroMode]=useState("banner");const[carouselMax,setCarouselMax]=useState(4);
  const[page,setPage]=useState("dashboard");
  const[theme,setTheme]=useState("light");
  const{confirm:confirmLogout,Dialog:LogoutDialog}=useConfirm();
  const doLogout=async()=>{if(await confirmLogout("Vous allez être déconnecté. Confirmez-vous ?"))setLogged(false)};
  const[sidebarOpen,setSidebarOpen]=useState(false);
  const[pinned,setPinned]=useState(false);
  const[expandedGroups,setExpandedGroups]=useState(NAV.map(g=>g.group));
  const[scrollState,setScrollState]=useState({top:false,bottom:false});
  const[searchOpen,setSearchOpen]=useState(false);
  const[notifOpen,setNotifOpen]=useState(false);
  const[toasts,setToasts]=useState([]);
  const[sessionWarning,setSessionWarning]=useState(false);
  const[tour,setTour]=useState(null);
  const[rgpdConsent,setRgpdConsent]=useState(false);

  const sidebarRef=useRef(null);
  const mainRef=useRef(null);
  const inactivityRef=useRef(null);
  const warnRef=useRef(null);

  const addDemande=(d)=>{setDemandes(prev=>[mkDemande(d),...prev])};
  const addToast=(msg,type='info',title='')=>{
    const id=Date.now()+Math.random();
    setToasts(t=>[...t,{id,msg,type,title}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),4200);
  };
  const removeToast=id=>setToasts(t=>t.filter(x=>x.id!==id));

  useEffect(()=>{document.body.setAttribute("data-theme",theme)},[theme]);

  // Session inactivity
  useEffect(()=>{if(!logged)return;
    const SESSION=15*60*1000,WARN=2*60*1000;
    const reset=()=>{setSessionWarning(false);clearTimeout(inactivityRef.current);
      clearTimeout(warnRef.current);
      warnRef.current=setTimeout(()=>setSessionWarning(true),SESSION-WARN);
      inactivityRef.current=setTimeout(()=>setLogged(false),SESSION)};
    const evts=["mousemove","keydown","click","scroll"];
    evts.forEach(e=>window.addEventListener(e,reset));reset();
    return()=>{evts.forEach(e=>window.removeEventListener(e,reset));
      clearTimeout(inactivityRef.current);clearTimeout(warnRef.current)}
  },[logged]);

  // Sidebar scroll detection
  useEffect(()=>{const el=sidebarRef.current;if(!el)return;
    const h=()=>{setScrollState({top:el.scrollTop>5,
      bottom:el.scrollHeight-el.scrollTop-el.clientHeight>5})};
    h();el.addEventListener("scroll",h);
    return()=>el.removeEventListener("scroll",h)},[logged]);

  // Keyboard shortcuts
  useEffect(()=>{const h=e=>{
    if(e.key==="Escape"){if(notifOpen)setNotifOpen(false);if(sidebarOpen)setSidebarOpen(false)}
  };document.addEventListener("keydown",h);return()=>document.removeEventListener("keydown",h)},[sidebarOpen,notifOpen]);

  // Scroll to top on page change
  useEffect(()=>{if(mainRef.current)mainRef.current.scrollTo({top:0});if(sidebarRef.current){const el=sidebarRef.current.querySelector('.nav-item.active');if(el)el.scrollIntoView({block:'nearest',behavior:'smooth'})}},[page]);

  const go=p=>{setPage(p);setSidebarOpen(false);setNotifOpen(false);
    const g=NAV.find(n=>n.items&&n.items.some(it=>it.page===p));
    if(g&&!expandedGroups.includes(g.group))setExpandedGroups(prev=>[...prev,g.group])};

  const ROLE_PAGES={etudiant:["vitrine","projets","reservation","mesresa","calendrier","evenements","reglement","notifications","aide","profil","mentions","confidentialite","accessibilite"],bde:["vitrine","projets","reservation","mesresa","calendrier","evenements","reglement","notifications","aide","demandes","profil","mentions","confidentialite","accessibilite"],formateur:["vitrine","projets","reservation","mesresa","calendrier","evenements","reglement","notifications","aide","demandes","formations","rapports","profil","mentions","confidentialite","accessibilite"],admin:null};
  const filteredNav=NAV.map(g=>({...g,items:g.items.filter(it=>ROLE_PAGES[userRole]===null||ROLE_PAGES[userRole].includes(it.page))})).filter(g=>g.items.length>0);
  useEffect(()=>{if(!logged)return;const allowed=ROLE_PAGES[userRole];if(allowed&&!allowed.includes(page))setPage(allowed[0])},[logged,page,userRole]);

  if(!logged)return(<><a href="#main-content" className="skip-link">Aller au contenu</a>
    <Landing onEnter={()=>{setLogged(true);setPage(userRole==="admin"?"dashboard":userRole==="formateur"||userRole==="bde"?"demandes":"mesresa")}} onRole={setUserRole}/></>);

  const renderPage=()=>{switch(page){
    case"vitrine":return<PageVitrine addToast={addToast} onTour={setTour} heroMode={heroMode}/>;
    case"reservation":return<PageReservation addToast={addToast} onTour={setTour} addDemande={addDemande} userRole={userRole}/>;
    case"mesresa":return<PageMesReservations addToast={addToast} go={go}/>;
    case"notifications":return<PageNotifications addToast={addToast} go={go}/>;
    case"evenements":return<PageEvenements addToast={addToast}/>;
    case"rapports":return<PageRapports addToast={addToast}/>;
    case"calendrier":return<PageCalendrier addToast={addToast} onTour={setTour} userRole={userRole} go={go}/>;
    case"projets":return<PageProjets addToast={addToast}/>;
    case"reglement":return<PageReglement/>;
    case"dashboard":return<PageDashboard addToast={addToast} onTour={setTour} demandes={demandes} go={go}/>;
    case"demandes":return<PageDemandes addToast={addToast} onTour={setTour} demandes={demandes} setDemandes={setDemandes} userRole={userRole}/>;
    case"formations":return<PageFormations addToast={addToast}/>;
    case"profil":return<PageProfil addToast={addToast} go={go} onTour={setTour} demandes={demandes}/>;
    case"parametres":return<PageParametres addToast={addToast}/>;
    case"aide":return<PageAide addToast={addToast} go={go}/>;
    case"statistiques":return<PageStatistiques addToast={addToast} onTour={setTour}/>;
    case"archives":return<PageArchives addToast={addToast}/>;
    case"blacklist":return<PageBlacklist addToast={addToast}/>;
    case"cms":return<PageCMS addToast={addToast} heroMode={heroMode} setHeroMode={setHeroMode} carouselMax={carouselMax} setCarouselMax={setCarouselMax}/>;
    case"stocks":return<PageStocks addToast={addToast} onTour={setTour}/>;
    case"machines":return<PageMachines addToast={addToast} onTour={setTour}/>;
    case"journal":return<PageJournal addToast={addToast} onTour={setTour}/>;
    case"mentions":return<PageMentions/>;
    case"confidentialite":return<PageConfidentialite/>;
    case"accessibilite":return<PageAccessibilite/>;
    default:return<PageVitrine addToast={addToast} onTour={setTour} heroMode={heroMode}/>
  }};

  const pageLabel=(()=>{for(const g of NAV)for(const it of g.items)
    if(it.page===page)return it.label;return"Dashboard"})();

  const dynNotifs=demandes.filter(d=>d.status==="en_attente").map(d=>({m:`Demande « ${d.titre} » en attente de validation`,t:d.date,c:"var(--warn)",d:"demandes"}));
  const sysNotifs=[{m:"Stock de PLA blanc en dessous du seuil",t:"Il y a 1h",c:"var(--warn)",d:"stocks"},{m:"Imprimante 3D #2 — maintenance requise",t:"Il y a 3h",c:"var(--danger)",d:"machines"}];
  const NOTIFS=[...dynNotifs,...sysNotifs].slice(0,8);

  return(
  <div className="app">
    <a href="#main-content" className="skip-link">Aller au contenu principal</a>

    {/* ═══ HEADER ═══ */}
    <header className="header">
      <div className="flex-row" style={{gap:8,flexWrap:"nowrap"}}>
        <button className="hamburger" onClick={()=>setSidebarOpen(!sidebarOpen)}
          aria-label="Menu" aria-expanded={sidebarOpen}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true" strokeWidth="2" strokeLinecap="round">
            <line x1="3" y1="7" x2="21" y2="7"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="17" x2="21" y2="17"/></svg>
        </button>
        <div className="logo">
          <div className="logo-mark">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" aria-hidden="true" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
              <rect x="6" y="14" width="12" height="8" rx="1"/></svg>
          </div>
          GeniusLab
        </div>
        <span style={{fontSize:11,fontWeight:700,color:"var(--accent)",background:"var(--accent-light)",
          padding:"2px 8px",borderRadius:4,fontFamily:"var(--font-mono)"}}>1.20</span>
        <div className="header-ctx">
          {ico(NAV.flatMap(g=>g.items).find(i=>i.page===page)?.icon||"home",12)}
          <span className="header-ctx-name">{pageLabel}</span>
        </div>
      </div>
      <div className="flex-row" style={{gap:6,flexWrap:"nowrap"}}>
        <button className="search-trigger" onClick={()=>setSearchOpen(true)} aria-label="Recherche">
          {ico("search",14)}<span>Recherche</span>
        </button>
        <div style={{position:"relative"}}>
          <button className="notif-bell" onClick={()=>setNotifOpen(n=>!n)}
            aria-label="Notifications" aria-expanded={notifOpen} aria-haspopup="true">
            {ico("bell",18)}{demandes.filter(d=>d.status==="en_attente").length>0&&<span className="notif-count">{demandes.filter(d=>d.status==="en_attente").length}</span>}
          </button>
          {notifOpen&&(<>
            <div style={{position:"fixed",inset:0,zIndex:199}} onClick={()=>setNotifOpen(false)}/>
            <div className="notif-panel" role="menu" aria-label="Notifications">
              <div className="notif-hdr"><span className="notif-hdr-title">Notifications</span>
                <button className="btn btn-sm btn-ghost" style={{fontSize:12,padding:"2px 8px"}}
                  onClick={()=>{setNotifOpen(false);addToast("Notifications marquées comme lues.","info")}}>Tout lire</button></div>
              {NOTIFS.map((n,i)=>(
                <div key={i} className="notif-item" role="menuitem" onClick={()=>{go(n.d);setNotifOpen(false)}}>
                  <div className="notif-dot" style={{background:n.c}}/>
                  <div className="notif-body"><div className="notif-msg">{n.m}</div><div className="notif-time">{n.t}</div></div>
                  {ico("chevR",12)}
                </div>
              ))}
            </div>
          </>)}
        </div>
        <div style={{width:1,height:20,background:"var(--border)"}}/>
        <div className="flex-row" style={{gap:4}}>
          <LI name={theme==="light"?"sun":"moon"} size={14} color="var(--text-muted)"/>
          <button className="theme-toggle" onClick={()=>setTheme(t=>t==="light"?"dark":"light")}
            aria-label={theme==="light"?"Mode sombre":"Mode clair"} role="switch" aria-checked={theme==="dark"}/>
        </div>
        <div style={{width:1,height:20,background:"var(--border)"}}/>
        <Popover trigger={<div className="flex-row" style={{gap:8,cursor:"pointer",padding:"4px 8px",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)",background:"var(--surface-alt)"}}>
          <Av name={userRole==="admin"?"Admin GeniusLab":userRole==="formateur"?"Formateur Demo":"Étudiant Demo"} size="sm"/>
          <div style={{lineHeight:1.2}}><div style={{fontSize:12,fontWeight:700,color:"var(--text-dark)"}}>{userRole==="admin"?"Admin GeniusLab":userRole==="formateur"?"Formateur Demo":"Étudiant Demo"}</div><div style={{fontSize:10,color:"var(--text-muted)"}}>{userRole==="admin"?"Administrateur":userRole==="formateur"?"Formateur":"Étudiant"}</div></div>
          {ico("chevD",10)}
        </div>} items={[{icon:"user",label:"Mon profil",onClick:()=>go("profil")},{icon:"settings",label:"Paramètres",onClick:()=>go("parametres")},{icon:"helpCircle",label:"Aide",onClick:()=>go("aide")},"sep",{icon:"logOut",label:"Se déconnecter",onClick:doLogout}]}/>
        <span className="tag" style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".5px"}}>{userRole==="admin"?"Admin":userRole==="formateur"?"Formateur":userRole==="bde"?"BDE":"Étudiant"}</span><button className="btn btn-sm btn-ghost" onClick={doLogout} aria-label="Déconnexion" title="Déconnexion">{ico("logOut",14)}</button>
      </div>
    </header>
    <div className="device-bar"><div className="device-icon"><LI name="printer" size={12} color="var(--accent)"/></div><strong>Interface PC</strong> · Administration, gestion et pilotage du GeniusLab — accessible depuis un ordinateur</div>

    {/* ═══ BODY ═══ */}
    <div className="body-wrap">
      <aside className={`sidebar${pinned?" pinned":""}${sidebarOpen?" open":""}`}
        aria-label="Navigation principale" role="navigation">
        <button className="sidebar-pin" onClick={()=>setPinned(!pinned)}
          aria-label={pinned?"Réduire":"Épingler"} title={pinned?"Réduire":"Épingler"}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            {pinned?<><path d="M12 17v5"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.18-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.18 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></>
              :<><path d="M9 4v6l-2 4h10l-2-4V4"/><path d="M12 16v5"/></>}
          </svg>
        </button>
        <div style={{height:10,flexShrink:0}}/>
        <div className={`sidebar-fade${scrollState.top?" has-scroll-top":""}${scrollState.bottom?" has-scroll-bottom":""}`}>
          <div className="sidebar-scroll" ref={sidebarRef}>
            <nav aria-label="Navigation">{filteredNav.map((g)=>{
              const isActive=g.items.some(it=>it.page===page);
              const collapsed=!isActive&&!expandedGroups.includes(g.group);
              return(<Fragment key={g.group}>
                <div className={`nav-group${collapsed?" collapsed":""}`}
                  onClick={()=>setExpandedGroups(prev=>
                    prev.includes(g.group)?prev.filter(x=>x!==g.group):[...prev,g.group])}
                  role="button" tabIndex={0} aria-expanded={!collapsed}
                  onKeyDown={e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();
                    setExpandedGroups(prev=>prev.includes(g.group)?prev.filter(x=>x!==g.group):[...prev,g.group])}}}>
                  <span className="nav-group-label">{g.group}</span>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true" strokeWidth="2.5" strokeLinecap="round"><path d="m6 9 6 6 6-6"/></svg>
                </div>
                {!collapsed&&g.items.map(it=>(
                  <div key={it.label} className={`nav-item${it.page===page?" active":""}`}
                    onClick={()=>go(it.page)} tabIndex={0} role="menuitem"
                    aria-current={it.page===page?"page":undefined} title={it.label}
                    onKeyDown={e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();go(it.page)}}}>
                    <LI name={it.icon} size={18}/>
                    <span className="nav-label">{it.label}</span>
                    {it.badge&&it.page!==page&&<span className="nav-badge">{it.badge}</span>}
                  </div>
                ))}
              </Fragment>)
            })}</nav>
          </div>
        </div>
        <div className="sidebar-footer">
          <div className="sidebar-version">GeniusLab 1.20</div>
          <div style={{marginTop:4,display:"flex",gap:10,opacity:.4,fontSize:11}}><span style={{cursor:"pointer"}} onClick={()=>go("mentions")}>Mentions</span><span style={{cursor:"pointer"}} onClick={()=>go("confidentialite")}>RGPD</span><span style={{cursor:"pointer"}} onClick={()=>go("accessibilite")}>RGAA</span></div>
        </div>
      </aside>
      {sidebarOpen&&<div className="sidebar-overlay" onClick={()=>setSidebarOpen(false)}/>}
      <main className="main" id="main-content" ref={mainRef} tabIndex={-1}>
        {renderPage()}
      </main>
    </div>

    {/* ═══ MOBILE BOTTOM NAV ═══ */}
    <nav className="mobile-bnav" aria-label="Navigation mobile">
      {(()=>{const bnav={etudiant:["vitrine","reservation","mesresa","notifications","profil"],bde:["vitrine","demandes","mesresa","notifications","profil"],formateur:["calendrier","demandes","mesresa","formations","profil"],admin:["dashboard","demandes","calendrier","machines","profil"]};const all=NAV.flatMap(g=>g.items);return bnav[userRole].map(p=>{const it=all.find(x=>x.page===p);return it?{i:it.icon,l:it.label,p:it.page}:{i:"home",l:p,p}})})().map(b=>(
        <button key={b.p} className={`mobile-bnav-btn${page===b.p?" act":""}`}
          onClick={()=>go(b.p)} aria-label={b.l} aria-current={page===b.p?"page":undefined}>{ico(b.i,20)}<span>{b.l}</span></button>
      ))}
    </nav>

    {/* ═══ FOOTER ═══ */}
    <footer className="app-footer" role="contentinfo">
      <span style={{fontWeight:600,color:"var(--text)"}}>GeniusLab</span> · Établissement
      · <button className="btn btn-sm btn-ghost" style={{padding:"2px 6px",minHeight:24}}
          onClick={()=>go("mentions")}>Mentions légales</button>
      · <button className="btn btn-sm btn-ghost" style={{padding:"2px 6px",minHeight:24}}
          onClick={()=>go("confidentialite")}>Confidentialité</button>
      · <button className="btn btn-sm btn-ghost" style={{padding:"2px 6px",minHeight:24}}
          onClick={()=>go("accessibilite")}>Accessibilité</button>
      · <button className="btn btn-sm btn-ghost" style={{padding:"2px 6px",minHeight:24,color:"var(--text-muted)"}}
          onClick={()=>setRgpdConsent(false)}>Cookies</button>
      <span style={{marginLeft:"auto",fontFamily:"var(--font-mono)",fontSize:11}}>1.20</span>
    </footer>

    {/* ═══ GLOBAL INFRASTRUCTURE ═══ */}
    {sessionWarning&&<div className="session-banner" role="alert" aria-live="assertive">
      {ico("clock",16)} Session expire dans 2 minutes.
      <button className="btn btn-sm" style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",fontWeight:800}}
        onClick={()=>setSessionWarning(false)}>Rester connecté</button>
      <button className="btn btn-sm btn-ghost" style={{color:"#fff",border:"1px solid rgba(255,255,255,.4)"}}
        onClick={()=>setLogged(false)}>Se déconnecter</button>
    </div>}
    <Toast toasts={toasts} remove={removeToast}/>
    <LogoutDialog/>
    <ScrollTop/>
    <GlobalSearch open={searchOpen} onClose={()=>setSearchOpen(false)} go={p=>{go(p);setSearchOpen(false)}}/>
    {tour&&<GuidedTour page={tour} onEnd={()=>setTour(null)}/>}
    {!rgpdConsent&&<RGPDBanner onAccept={()=>{setRgpdConsent(true);addToast("Préférences enregistrées.","success","RGPD")}}/>}
  </div>)
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
